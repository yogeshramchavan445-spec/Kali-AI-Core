name: Build Kali AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
    
    - name: Create local.properties
      run: |
        echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_KEY }}" >> local.properties
        echo "GEMINI_KEY=${{ secrets.GEMINI_KEY }}" >> local.properties
        echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> local.properties
        echo "GITHUB_USER=${{ secrets.GITHUB_USER }}" >> local.properties
        echo "GITHUB_REPO=${{ secrets.GITHUB_REPO }}" >> local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: kali-ai-apk
        path: app/build/outputs/apk/debug/app-debug.apk
